<!doctype html>
<html lang="en">
  <head>
    <!-- Meta Data -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Form with several input types and validation."
    />
    <meta name="author" content="Danil_Dikhtyar" />

    <!-- Webpage Title & Favicon Icons -->
    <title>Frontend Mentor | Contact form</title>

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./assets/icons/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/icons/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./assets/icons/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="./assets/icons/favicon/site.webmanifest" />

    <!-- Linking Styles -->
    <link rel="stylesheet" href="./css/main.css" />

    <!-- Linking Scripts -->
    <script type="module" src="./js/script.js" defer></script>

    <!-- Linking Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
      rel="preload"
      as="style"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main>
      <article class="contact-form">
        <div class="contact-form__status-bar">
          <div class="contact-form__heading-block">
            <svg class="contact-form__icon">
              <use href="./assets/icons/icons.svg#success-check" />
            </svg>
            <p class="contact-form__heading--for-status-bar">Message Sent!</p>
          </div>

          <p class="contact-form__description">
            Thanks for completing the form. We'll be in touch soon!
          </p>
        </div>

        <h1 class="contact-form__heading">Contact Us</h1>

        <form action="#" class="contact-form__form">
          <div
            class="contact-form__input-field contact-form__input-field--type-text"
          >
            <label for="first-name" class="contact-form__label"
              ><span class="contact-form__label-text">First Name</span></label
            >
            <input
              type="text"
              name="first-name"
              id="first-name"
              class="contact-form__input contact-form__input--type-text"
            />
            <p class="contact-form__input-validation-description">
              This field is required
            </p>
          </div>

          <div
            class="contact-form__input-field contact-form__input-field--type-text"
          >
            <label for="last-name" class="contact-form__label"
              ><span class="contact-form__label-text">Last Name</span></label
            >
            <input
              type="text"
              name="last-name"
              id="last-name"
              class="contact-form__input contact-form__input--type-text"
            />
            <p class="contact-form__input-validation-description">
              This field is required
            </p>
          </div>

          <div
            class="contact-form__input-field contact-form__input-field--type-email"
          >
            <label for="email" class="contact-form__label"
              ><span class="contact-form__label-text"
                >Email Address</span
              ></label
            >
            <input
              type="email"
              name="email"
              id="email"
              class="contact-form__input contact-form__input--type-email"
            />
            <p class="contact-form__input-validation-description">
              Please enter a valid email address
            </p>
          </div>

          <fieldset class="contact-form__input-fieldset">
            <legend class="contact-form__legend">
              <span class="contact-form__legend-text">Query Type</span>
            </legend>

            <div
              class="contact-form__input-field contact-form__input-field--type-radio"
            >
              <input
                type="radio"
                name="query-type"
                id="general-enquiry"
                class="contact-form__input contact-form__input--type-radio"
              />
              <label
                for="general-enquiry"
                class="contact-form__label contact-form__label--type-radio"
                >General Enquiry</label
              >
            </div>

            <div
              class="contact-form__input-field contact-form__input-field--type-radio"
            >
              <input
                type="radio"
                name="query-type"
                id="support-request"
                class="contact-form__input contact-form__input--type-radio"
              />
              <label
                for="support-request"
                class="contact-form__label contact-form__label--type-radio"
                >Support Request</label
              >
            </div>

            <p class="contact-form__input-validation-description">
              Please select a query type
            </p>
          </fieldset>

          <div
            class="contact-form__input-field contact-form__input-field--type-textarea"
          >
            <label for="message" class="contact-form__label"
              ><span class="contact-form__label-text">Message</span></label
            >
            <textarea
              name="message"
              id="message"
              cols="30"
              rows="10"
              class="contact-form__input contact-form__input--type-textarea"
            ></textarea>
            <p class="contact-form__input-validation-description">
              This field is required
            </p>
          </div>

          <div
            class="contact-form__input-field contact-form__input-field--type-checkbox"
          >
            <div class="contact-form__checkbox-container">
              <input
                type="checkbox"
                name="contact-consent"
                id="contact-consent"
                class="contact-form__input contact-form__input--type-checkbox"
              />
              <label for="contact-consent" class="contact-form__label"
                ><span class="contact-form__label-text"
                  >I consent to being contacted by the team</span
                ></label
              >
            </div>
            <p
              class="contact-form__input-validation-description contact-form__input-validation-description--type-checkbox"
            >
              To submit this form, please consent to being contacted
            </p>
          </div>

          <button type="submit" class="contact-form__submit-button">
            Submit
          </button>
        </form>
      </article>
    </main>
  </body>
</html>
